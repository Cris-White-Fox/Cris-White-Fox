<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Writer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #FAF8F5;
      --surface: #FFFFFF;
      --text-primary: #2C3E50;
      --text-secondary: #7F8C9A;
      --accent: #D4A574;
      --border: #E8E4DF;
      --danger: #E74C3C;
      --font-writing: 'Merriweather', Georgia, serif;
      --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --tab-panel-width: 56px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 14px;
      line-height: 1.5;
    }

    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Main Content Area */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-view {
      display: none;
      flex: 1;
      overflow: hidden;
    }

    .panel-view.active {
      display: flex;
      flex-direction: column;
    }

    .writing-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--surface);
    }

    .writing-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      background: var(--surface);
    }

    .writing-header h2 {
      font-family: var(--font-writing);
      font-size: 18px;
      font-weight: 700;
    }

    .word-count {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .writing-textarea {
      flex: 1;
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      padding: 24px 32px;
      font-family: var(--font-writing);
      font-size: 18px;
      line-height: 1.8;
      color: var(--text-primary);
      background: var(--surface);
    }

    .writing-textarea::placeholder {
      color: var(--text-secondary);
      font-style: italic;
    }

    /* Tab Panel - Desktop (vertical on right) */
    .tab-panel {
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      width: var(--tab-panel-width);
      flex-shrink: 0;
      position: relative;
    }

    .tab-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 200ms ease-out;
      min-height: 80px;
    }

    .tab-btn:last-child {
      border-bottom: none;
    }

    .tab-btn:hover {
      background: var(--bg);
      color: var(--text-primary);
    }

    .tab-btn.active {
      color: var(--accent);
      background: var(--bg);
    }

    .tab-btn svg {
      width: 24px;
      height: 24px;
      stroke-width: 1.5;
    }

    .tab-label {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Mobile Horizontal Tabs */
    .mobile-tabs {
      display: none;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .mobile-tab-btn {
      flex: 1;
      padding: 14px 8px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 200ms ease-out;
    }

    .mobile-tab-btn:hover {
      color: var(--text-primary);
      background: var(--bg);
    }

    .mobile-tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* Character Panel Specific Styles */
    .character-list-view {
      flex: 1;
      background: var(--surface);
      border-radius: 8px;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.06);
      overflow: hidden;
    }

    .character-list-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .character-list-header h3 {
      font-family: var(--font-writing);
      font-size: 18px;
      font-weight: 700;
    }

    .character-list {
      padding: 16px;
      overflow-y: auto;
      flex: 1;
    }

    .character-list-item {
      padding: 14px 16px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 150ms;
    }

    .character-list-item:hover {
      background: var(--bg);
    }

    .character-list-item.selected {
      background: var(--bg);
      border-left: 3px solid var(--accent);
    }

    .character-list-item .name {
      font-weight: 500;
    }

    .character-list-item .name.empty {
      color: var(--text-secondary);
      font-style: italic;
    }

    .character-editor-view {
      flex: 1;
      background: var(--surface);
      border-radius: 8px;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .character-editor-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .character-editor-header h3 {
      font-family: var(--font-writing);
      font-size: 16px;
      font-weight: 700;
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 4px;
      transition: all 150ms;
    }

    .back-btn:hover {
      background: var(--bg);
      color: var(--text-primary);
    }

    .back-btn svg {
      width: 16px;
      height: 16px;
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 8px;
      border-radius: 4px;
      transition: all 150ms;
    }

    .delete-btn:hover {
      background: #fdf2f2;
      color: var(--danger);
    }

    .delete-btn svg {
      width: 20px;
      height: 20px;
      stroke-width: 1.5;
    }

    .character-name-input {
      width: 100%;
      padding: 20px 24px;
      border: none;
      border-bottom: 1px solid var(--border);
      font-family: var(--font-writing);
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      background: transparent;
      outline: none;
    }

    .character-name-input::placeholder {
      color: var(--text-secondary);
      font-style: italic;
      font-weight: 400;
    }

    .character-name-input:focus {
      background: var(--bg);
    }

    .character-content-input {
      flex: 1;
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      padding: 24px;
      font-family: var(--font-writing);
      font-size: 16px;
      line-height: 1.8;
      color: var(--text-primary);
      background: transparent;
    }

    .character-content-input::placeholder {
      color: var(--text-secondary);
      font-style: italic;
    }

    .character-empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--text-secondary);
      padding: 32px;
    }

    .character-empty-state p {
      margin-bottom: 16px;
      max-width: 280px;
    }

    /* Confirmation Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 200ms, visibility 200ms;
    }

    .modal-overlay.visible {
      opacity: 1;
      visibility: visible;
    }

    .modal-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 24px;
      max-width: 360px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .modal-card h4 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .modal-card p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 20px;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .modal-btn {
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 150ms;
    }

    .modal-btn.cancel {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-primary);
    }

    .modal-btn.cancel:hover {
      background: var(--border);
    }

    .modal-btn.delete {
      background: var(--danger);
      border: none;
      color: white;
    }

    .modal-btn.delete:hover {
      background: #c0392b;
    }

    /* Save Indicator */
    .save-indicator {
      position: fixed;
      bottom: 24px;
      left: 24px;
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 12px;
      color: var(--text-secondary);
      opacity: 0;
      transition: opacity 200ms ease-out;
      pointer-events: none;
      z-index: 100;
    }

    .save-indicator.visible {
      opacity: 1;
    }

    /* Add Character Button */
    .add-character-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 150ms;
    }

    .add-character-btn:hover {
      background: #c49660;
    }

    .add-character-btn svg {
      width: 18px;
      height: 18px;
    }

    /* Chat Panel Styles */
    .chat-container {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .chat-sidebar {
      width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .chat-sidebar-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .chat-sidebar-section:last-child {
      border-bottom: none;
    }

    .chat-sidebar-section h4 {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .chat-sidebar-scroll {
      max-height: 150px;
      overflow-y: auto;
    }

    .chat-system-prompt-item,
    .chat-character-item {
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 150ms;
      font-size: 13px;
    }

    .chat-system-prompt-item:hover,
    .chat-character-item:hover {
      background: var(--bg);
    }

    .chat-system-prompt-item.selected,
    .chat-character-item.selected {
      background: var(--bg);
      border-left: 3px solid var(--accent);
    }

    .chat-system-prompt-item input[type="checkbox"],
    .chat-character-item input[type="checkbox"] {
      accent-color: var(--accent);
    }

    .chat-system-prompt-item .delete-system-prompt {
      margin-left: auto;
      opacity: 0;
      color: var(--text-secondary);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      font-size: 12px;
    }

    .chat-checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 13px;
      padding: 8px 0;
    }

    .chat-checkbox-item input {
      accent-color: var(--accent);
    }

    .chat-add-btn {
      width: 100%;
      padding: 10px;
      background: var(--bg);
      border: 1px dashed var(--border);
      border-radius: 6px;
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 12px;
      transition: all 150ms;
    }

    .chat-add-btn:hover {
      background: var(--border);
      color: var(--text-primary);
    }

    .chat-add-btn svg {
      width: 16px;
      height: 16px;
    }

    /* System Prompt Modal */
    .chat-system-prompt-name-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: var(--font-ui);
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
    }

    .chat-system-prompt-name-input:focus {
      border-color: var(--accent);
    }

    .chat-system-prompt-content-input {
      width: 100%;
      min-height: 150px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: var(--font-writing);
      font-size: 14px;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      margin-bottom: 16px;
    }

    .chat-system-prompt-content-input:focus {
      border-color: var(--accent);
    }

    /* Responsive - Mobile */
    @media (max-width: 768px) {
      .app {
        flex-direction: column;
      }

      .tab-panel {
        display: none;
      }

      .mobile-tabs {
        display: flex;
        order: -1;
      }

      .writing-textarea {
        padding: 16px 20px;
        font-size: 16px;
      }

      .tab-btn {
        min-height: auto;
        padding: 12px;
      }

      .tab-label {
        display: none;
      }

      .writing-container {
        padding: 16px;
      }

      .chat-container {
        flex-direction: column;
      }
    }

    /* Chat Settings Panel */
    .chat-settings-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.3);
      z-index: 1500;
      opacity: 0;
      visibility: hidden;
      transition: opacity 200ms, visibility 200ms;
    }

    .chat-settings-overlay.visible {
      opacity: 1;
      visibility: visible;
    }

    .chat-settings-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 320px;
      max-width: 90vw;
      height: 100vh;
      background: var(--surface);
      box-shadow: -4px 0 20px rgba(0,0,0,0.15);
      z-index: 1501;
      transform: translateX(100%);
      transition: transform 250ms ease-out;
      display: flex;
      flex-direction: column;
    }

    .chat-settings-panel.open {
      transform: translateX(0);
    }

    .chat-settings-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .chat-settings-header h4 {
      font-size: 16px;
      font-weight: 600;
    }

    .chat-settings-close {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-settings-close:hover {
      background: var(--bg);
      color: var(--text-primary);
    }

    .chat-settings-close svg {
      width: 20px;
      height: 20px;
    }

    .chat-settings-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }

    .chat-settings-section {
      margin-bottom: 24px;
    }

    .chat-settings-section:last-child {
      margin-bottom: 0;
    }

    .chat-settings-section h5 {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .chat-settings-item {
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 150ms;
      font-size: 13px;
    }

    .chat-settings-item:hover {
      background: var(--bg);
    }

    .chat-settings-item.selected {
      background: var(--bg);
      border-left: 3px solid var(--accent);
    }

    .chat-settings-item input[type="radio"],
    .chat-settings-item input[type="checkbox"] {
      accent-color: var(--accent);
    }

    .chat-settings-item .delete-prompt-btn {
      margin-left: auto;
      opacity: 0;
      color: var(--text-secondary);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      font-size: 12px;
    }


    /* Chat Main Area */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px;
      overflow: hidden;
    }

    .chat-prompt-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-radius: 8px;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.06);
      overflow: hidden;
    }

    .chat-prompt-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      font-weight: 500;
    }

    .chat-settings-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 150ms;
    }

    .chat-settings-btn:hover {
      background: var(--border);
    }

    .chat-settings-btn svg {
      width: 16px;
      height: 16px;
    }

    .chat-copy-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 4px;
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 150ms;
    }

    .chat-copy-btn:hover {
      background: #c49660;
    }

    .chat-copy-btn.copied {
      background: #27ae60;
    }

    .chat-copy-btn svg {
      width: 16px;
      height: 16px;
    }

    .chat-prompt-input {
      flex: 1;
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      padding: 16px;
      font-family: var(--font-writing);
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-primary);
      background: transparent;
    }

    .chat-prompt-input::placeholder {
      color: var(--text-secondary);
      font-style: italic;
    }

    .chat-selected-context {
      padding: 8px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 12px;
    }

    .chat-context-tag {
      padding: 3px 8px;
      background: var(--bg);
      border-radius: 4px;
      color: var(--text-secondary);
    }

    .chat-context-tag.system-prompt {
      background: #e8f4ea;
      color: #2d7a3e;
    }

    .chat-context-tag.character {
      background: #e8f0fc;
      color: #3a5bb8;
    }

    .chat-context-tag.story {
      background: #fce8e8;
      color: #a83a3a;
    }

    .chat-context-tag.plotmap {
      background: #fce8f0;
      color: #a83a7a;
    }
  </style>
</head>
<body>
  <div class="app">
    <main class="main-content">
      <!-- Story Panel -->
      <div class="panel-view active" id="story-panel">
        <div class="writing-container">
          <header class="writing-header">
            <h2>Story</h2>
            <span class="word-count" id="storyWordCount">0 words</span>
          </header>
          <textarea
            class="writing-textarea"
            id="storyEditor"
            placeholder="Once upon a time..."
          ></textarea>
        </div>
      </div>

      <!-- Character Panel -->
      <div class="panel-view" id="character-panel">
        <!-- Character List View -->
        <div class="writing-container" id="characterListView">
          <div class="character-list-view">
            <div class="character-list-header">
              <h3>Characters</h3>
            </div>
            <div class="character-list" id="characterList"></div>
            <div style="padding: 16px; border-top: 1px solid var(--border);">
              <button class="add-character-btn" id="addCharacterBtn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
                Create New Character
              </button>
            </div>
          </div>
        </div>

        <!-- Character Editor View -->
        <div class="writing-container" id="characterEditorView" style="display: none;">
          <div class="character-editor-view">
            <div class="character-editor-header">
              <button class="back-btn" id="backToListBtn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">

              <button class="delete-btn" id="deleteCharacterBtn" title="Delete character">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
                </svg>
              </button>
            </div>
            <input
              type="text"
              class="character-name-input"
              id="characterNameInput"
              placeholder="Character name"
            >
            <textarea
              class="character-content-input"
              id="characterContentInput"
              placeholder="Write your character's story, backstory, and details..."
            ></textarea>
          </div>
        </div>
      </div>

      <!-- Plot Map Panel -->
      <div class="panel-view" id="plotmap-panel">
        <div class="writing-container">
          <header class="writing-header">
            <h2>Plot Map</h2>
            <span class="word-count" id="plotmapWordCount">0 words</span>
          </header>
          <textarea
            class="writing-textarea"
            id="plotmapEditor"
            placeholder="Jot down key events, scenes, and plot points..."
          ></textarea>
        </div>
      </div>

      <!-- Chat Panel -->
      <div class="panel-view" id="chat-panel">
        <div class="chat-container">
          <div class="chat-main">
            <div class="chat-prompt-area">
              <div class="chat-prompt-header">
                <button class="chat-settings-btn" id="chatSettingsBtn">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  </svg>
                  Context Settings
                </button>
                <button class="chat-copy-btn" id="copyPromptBtn">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 01-.75.75H9.75a.75.75 0 01-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 011.927-.184" />
                  </svg>
                  Copy to Clipboard
                </button>
              </div>
              <textarea
                class="chat-prompt-input"
                id="chatPromptInput"
                placeholder="Write your prompt here... Use the Context Settings button to add system prompts, characters, story content, or plot map to your prompt."
              ></textarea>
              <div class="chat-selected-context" id="chatSelectedContext"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Chat Settings Overlay -->
      <div class="chat-settings-overlay" id="chatSettingsOverlay"></div>

      <!-- Chat Settings Panel -->
      <div class="chat-settings-panel" id="chatSettingsPanel">
        <div class="chat-settings-header">
          <h4>Context Settings</h4>
          <button class="chat-settings-close" id="chatSettingsClose">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
        <div class="chat-settings-content">
          <div class="chat-settings-section">
            <h5>System Prompt (select one)</h5>
            <div id="chatSystemPromptList"></div>
            <button class="chat-add-btn" id="addSystemPromptBtn">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
              </svg>
              Add Prompt
            </button>
          </div>

          <div class="chat-settings-section">
            <h5>Characters (select multiple)</h5>
            <div id="chatCharacterList"></div>
          </div>

          <div class="chat-settings-section">
            <h5>Story Content</h5>
            <label class="chat-settings-item">
              <input type="checkbox" id="chatIncludeStory">
              <span>Main Story</span>
            </label>
          </div>

          <div class="chat-settings-section">
            <h5>Plot Map</h5>
            <label class="chat-settings-item">
              <input type="checkbox" id="chatIncludePlotmap">
              <span>Plot Map</span>
            </label>
          </div>
        </div>
      </div>

      <!-- Mobile Tab Bar -->
      <nav class="mobile-tabs">
        <button class="mobile-tab-btn active" data-tab="story">Story</button>
        <button class="mobile-tab-btn" data-tab="character">Character</button>
        <button class="mobile-tab-btn" data-tab="plotmap">Plot Map</button>
        <button class="mobile-tab-btn" data-tab="chat">Chat</button>
      </nav>
    </main>

    <!-- Desktop Vertical Tab Panel -->
    <nav class="tab-panel">
      <button class="tab-btn active" data-tab="story" title="Story">
        <span class="tab-label">Story</span>
      </button>
      <button class="tab-btn" data-tab="character" title="Character">
        <span class="tab-label">Character</span>
      </button>
      <button class="tab-btn" data-tab="plotmap" title="Plot Map">
        <span class="tab-label">Plot</span>
      </button>
      <button class="tab-btn" data-tab="chat" title="Chat">
        <span class="tab-label">Chat</span>
      </button>
    </nav>

    <!-- Delete Confirmation Modal -->
    <div class="modal-overlay" id="deleteModal">
      <div class="modal-card">
        <h4>Delete this character?</h4>
        <p>This action cannot be undone. All content for this character will be lost.</p>
        <div class="modal-actions">
          <button class="modal-btn cancel" id="cancelDeleteBtn">Cancel</button>
          <button class="modal-btn delete" id="confirmDeleteBtn">Delete</button>
        </div>
      </div>
    </div>

    <!-- System Prompt Modal -->
    <div class="modal-overlay" id="systemPromptModal">
      <div class="modal-card" style="max-width: 500px;">
        <h4 id="systemPromptModalTitle">Add System Prompt</h4>
        <input type="text" class="chat-system-prompt-name-input" id="systemPromptNameInput" placeholder="Prompt name (e.g., 'Character Card Editor')">
        <textarea class="chat-system-prompt-content-input" id="systemPromptContentInput" placeholder="System prompt content..."></textarea>
        <div class="modal-actions">
          <button class="modal-btn cancel" id="cancelSystemPromptBtn">Cancel</button>
          <button class="modal-btn delete" id="deleteSystemPromptBtn" style="display: none;">Delete</button>
          <button class="modal-btn confirm" id="saveSystemPromptBtn">Save</button>
        </div>
      </div>
    </div>

    <div class="save-indicator" id="saveIndicator">Saved</div>
  </div>

  <script>
    (function() {
      'use strict';

      const STORAGE_KEYS = {
        mainText: 'storywriter_maintext',
        characters: 'storywriter_characters',
        plotmap: 'storywriter_plotmap',
        systemPrompts: 'storywriter_systemprompts'
      };

      // DOM Elements
      const desktopTabBtns = document.querySelectorAll('.tab-panel .tab-btn');
      const mobileTabBtns = document.querySelectorAll('.mobile-tab-btn');
      const panelViews = document.querySelectorAll('.panel-view');
      
      const storyEditor = document.getElementById('storyEditor');
      const storyWordCount = document.getElementById('storyWordCount');
      
      const plotmapEditor = document.getElementById('plotmapEditor');
      const plotmapWordCount = document.getElementById('plotmapWordCount');
      
      const saveIndicator = document.getElementById('saveIndicator');
      
      // Character panel elements
      const characterListView = document.getElementById('characterListView');
      const characterEditorView = document.getElementById('characterEditorView');
      const characterList = document.getElementById('characterList');
      const addCharacterBtn = document.getElementById('addCharacterBtn');
      const backToListBtn = document.getElementById('backToListBtn');
      const deleteCharacterBtn = document.getElementById('deleteCharacterBtn');
      const characterNameInput = document.getElementById('characterNameInput');
      const characterContentInput = document.getElementById('characterContentInput');
      const deleteModal = document.getElementById('deleteModal');
      const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
      const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');

      let characters = [];
      let currentCharacterId = null;

      // Utility Functions
      function generateId() {
        return Date.now().toString(36) + Math.random().toString(36).substr(2);
      }

      function debounce(fn, delay) {
        let timeout;
        return function(...args) {
          clearTimeout(timeout);
          timeout = setTimeout(() => fn.apply(this, args), delay);
        };
      }

      function countWords(text) {
        const trimmed = text.trim();
        if (!trimmed) return 0;
        return trimmed.split(/\s+/).length;
      }

      function showSaveIndicator() {
        saveIndicator.classList.add('visible');
        setTimeout(() => {
          saveIndicator.classList.remove('visible');
        }, 1500);
      }

      // Tab Switching
      function switchTab(tabId) {
        // Save current character before switching
        if (currentCharacterId && tabId !== 'character') {
          saveCurrentCharacter();
        }

        desktopTabBtns.forEach(btn => {
          btn.classList.toggle('active', btn.dataset.tab === tabId);
        });
        mobileTabBtns.forEach(btn => {
          btn.classList.toggle('active', btn.dataset.tab === tabId);
        });
        panelViews.forEach(view => {
          view.classList.toggle('active', view.id === `${tabId}-panel`);
        });

        // Handle character view state
        if (tabId === 'character') {
          if (currentCharacterId) {
            showCharacterEditor();
          } else {
            showCharacterList();
          }
        }
      }

      function initTabs() {
        const allTabBtns = [...desktopTabBtns, ...mobileTabBtns];
        allTabBtns.forEach(btn => {
          btn.addEventListener('click', () => {
            switchTab(btn.dataset.tab);
          });
        });
      }

      // Character List View
      function showCharacterList() {
        characterListView.style.display = 'flex';
        characterEditorView.style.display = 'none';
        renderCharacterList();
      }

      function showCharacterEditor() {
        characterListView.style.display = 'none';
        characterEditorView.style.display = 'flex';
      }

      function renderCharacterList() {
        characterList.innerHTML = '';
        
        if (characters.length === 0) {
          characterList.innerHTML = `
            <div class="character-empty-state">
              <p>No characters yet. Create your first character to get started.</p>
            </div>
          `;
        } else {
          characters.forEach(char => {
            const item = document.createElement('div');
            item.className = 'character-list-item';
            item.dataset.id = char.id;
            
            const nameSpan = document.createElement('span');
            nameSpan.className = 'name' + (char.name ? '' : ' empty');
            nameSpan.textContent = char.name || 'Unnamed Character';
            
            item.appendChild(nameSpan);
            item.addEventListener('click', () => selectCharacter(char.id));
            
            characterList.appendChild(item);
          });
        }
      }

      // Character CRUD
      function loadCharacters() {
        try {
          const data = localStorage.getItem(STORAGE_KEYS.characters);
          characters = data ? JSON.parse(data) : [];
        } catch (e) {
          characters = [];
        }
      }

      function saveCharacters() {
        localStorage.setItem(STORAGE_KEYS.characters, JSON.stringify(characters));
        showSaveIndicator();
      }

      function selectCharacter(id) {
        saveCurrentCharacter();
        currentCharacterId = id;
        
        const char = characters.find(c => c.id === id);
        if (char) {
          characterNameInput.value = char.name || '';
          characterContentInput.value = char.content || '';
        }
        
        showCharacterEditor();
        characterNameInput.focus();
      }

      function createCharacter() {
        saveCurrentCharacter();
        
        const newChar = {
          id: generateId(),
          name: '',
          content: ''
        };
        characters.push(newChar);
        saveCharacters();
        
        selectCharacter(newChar.id);
        characterNameInput.focus();
      }

      const debouncedSaveCharacter = debounce(() => {
        saveCurrentCharacter();
      }, 500);

      function saveCurrentCharacter() {
        if (!currentCharacterId) return;
        
        const char = characters.find(c => c.id === currentCharacterId);
        if (char) {
          char.name = characterNameInput.value;
          char.content = characterContentInput.value;
          saveCharacters();
        }
      }

      function deleteCharacter() {
        if (!currentCharacterId) return;
        
        characters = characters.filter(c => c.id !== currentCharacterId);
        saveCharacters();
        currentCharacterId = null;
        
        characterNameInput.value = '';
        characterContentInput.value = '';
        
        showCharacterList();
        hideDeleteModal();
      }

      // Delete Modal
      function showDeleteModal() {
        deleteModal.classList.add('visible');
      }

      function hideDeleteModal() {
        deleteModal.classList.remove('visible');
      }

      // Event Listeners for Character Panel
      function initCharacterPanel() {
        loadCharacters();
        
        addCharacterBtn.addEventListener('click', () => {
          createCharacter();
          switchTab('character');
        });
        
        backToListBtn.addEventListener('click', () => {
          saveCurrentCharacter();
          currentCharacterId = null;
          showCharacterList();
        });
        
        deleteCharacterBtn.addEventListener('click', showDeleteModal);
        cancelDeleteBtn.addEventListener('click', hideDeleteModal);
        confirmDeleteBtn.addEventListener('click', deleteCharacter);
        
        // Close modal on overlay click
        deleteModal.addEventListener('click', (e) => {
          if (e.target === deleteModal) {
            hideDeleteModal();
          }
        });
        
        characterNameInput.addEventListener('input', debouncedSaveCharacter);
        characterContentInput.addEventListener('input', debouncedSaveCharacter);
      }

      // Update word count display
      function updateWordCount(textarea, countElement) {
        const count = countWords(textarea.value);
        countElement.textContent = `${count} word${count !== 1 ? 's' : ''}`;
      }

      // Initialize Story Panel
      function initStoryPanel() {
        const savedText = localStorage.getItem(STORAGE_KEYS.mainText) || '';
        storyEditor.value = savedText;
        updateWordCount(storyEditor, storyWordCount);

        const debouncedSave = debounce(() => {
          localStorage.setItem(STORAGE_KEYS.mainText, storyEditor.value);
          showSaveIndicator();
        }, 500);

        storyEditor.addEventListener('input', () => {
          updateWordCount(storyEditor, storyWordCount);
          debouncedSave();
        });
      }

      // Initialize Plot Map Panel
      function initPlotmapPanel() {
        const savedText = localStorage.getItem(STORAGE_KEYS.plotmap) || '';
        plotmapEditor.value = savedText;
        updateWordCount(plotmapEditor, plotmapWordCount);

        const debouncedSave = debounce(() => {
          localStorage.setItem(STORAGE_KEYS.plotmap, plotmapEditor.value);
          showSaveIndicator();
        }, 500);

        plotmapEditor.addEventListener('input', () => {
          updateWordCount(plotmapEditor, plotmapWordCount);
          debouncedSave();
        });
      }

      // Chat Panel - System Prompts
      let systemPrompts = [];
      let currentEditingPromptId = null;

      function loadSystemPrompts() {
        try {
          const data = localStorage.getItem(STORAGE_KEYS.systemPrompts);
          systemPrompts = data ? JSON.parse(data) : [];
        } catch (e) {
          systemPrompts = [];
        }
      }

      function saveSystemPrompts() {
        localStorage.setItem(STORAGE_KEYS.systemPrompts, JSON.stringify(systemPrompts));
        showSaveIndicator();
      }

      function generateChatPrompt() {
        let prompt = '';

        // Add selected system prompt first (radio button - only one selectable, or none)
        const selectedPrompt = document.querySelector('.chat-settings-item input[name="systemPrompt"]:checked');
        if (selectedPrompt && selectedPrompt.value) {
          const promptId = selectedPrompt.dataset.id;
          const promptObj = systemPrompts.find(p => p.id === promptId);
          if (promptObj) {
            prompt += `=== SYSTEM PROMPT: ${promptObj.name} ===\n${promptObj.content}\n\n`;
          }
        }

        // Add selected characters
        const selectedChars = document.querySelectorAll('.chat-settings-item input[data-char-id]:checked');
        const selectedCharIds = [];
        selectedChars.forEach(checkbox => {
          if (checkbox.dataset.charId) {
            selectedCharIds.push(checkbox.dataset.charId);
          }
        });

        if (selectedCharIds.length > 0) {
          prompt += `=== CHARACTERS ===\n`;
          selectedCharIds.forEach(charId => {
            const char = characters.find(c => c.id === charId);
            if (char) {
              prompt += `\n--- ${char.name || 'Unnamed Character'} ---\n${char.content || ''}\n`;
            }
          });
          prompt += '\n';
        }

        // Add plot map first (user wants plot map before main story)
        if (document.getElementById('chatIncludePlotmap').checked) {
          const plotmapContent = plotmapEditor.value.trim();
          if (plotmapContent) {
            prompt += `=== PLOT MAP ===\n${plotmapContent}\n\n`;
          }
        }

        // Add main story if checkbox checked
        if (document.getElementById('chatIncludeStory').checked) {
          const storyContent = storyEditor.value.trim();
          if (storyContent) {
            prompt += `=== MAIN STORY ===\n${storyContent}\n\n`;
          }
        }

        return prompt;
      }

      function updateSelectedContextTags() {
        const container = document.getElementById('chatSelectedContext');
        container.innerHTML = '';

        // Add system prompt tag (only if one is selected with a value)
        const selectedPrompt = document.querySelector('.chat-settings-item input[name="systemPrompt"]:checked');
        if (selectedPrompt && selectedPrompt.value) {
          const promptId = selectedPrompt.dataset.id;
          const promptObj = systemPrompts.find(p => p.id === promptId);
          if (promptObj) {
            const tag = document.createElement('span');
            tag.className = 'chat-context-tag system-prompt';
            tag.textContent = promptObj.name;
            container.appendChild(tag);
          }
        }

        // Add character tags
        const selectedChars = document.querySelectorAll('.chat-settings-item input[data-char-id]:checked');
        selectedChars.forEach(checkbox => {
          if (checkbox.dataset.charId) {
            const char = characters.find(c => c.id === checkbox.dataset.charId);
            if (char) {
              const tag = document.createElement('span');
              tag.className = 'chat-context-tag character';
              tag.textContent = char.name || 'Unnamed';
              container.appendChild(tag);
            }
          }
        });

        // Add plot map tag first (before story)
        if (document.getElementById('chatIncludePlotmap').checked) {
          const tag = document.createElement('span');
          tag.className = 'chat-context-tag plotmap';
          tag.textContent = 'Plot Map';
          container.appendChild(tag);
        }

        // Add story tag
        if (document.getElementById('chatIncludeStory').checked) {
          const tag = document.createElement('span');
          tag.className = 'chat-context-tag story';
          tag.textContent = 'Story';
          container.appendChild(tag);
        }
      }

      function renderChatSystemPromptList() {
        const container = document.getElementById('chatSystemPromptList');
        container.innerHTML = '';

        // Add "None" option first - allows user to deselect
        const noneItem = document.createElement('label');
        noneItem.className = 'chat-settings-item';
        noneItem.innerHTML = `
          <input type="radio" name="systemPrompt" value="" checked>
          <span>None</span>
        `;
        container.appendChild(noneItem);

        if (systemPrompts.length === 0) {
          return;
        }

        systemPrompts.forEach(prompt => {
          const item = document.createElement('label');
          item.className = 'chat-settings-item';
          item.innerHTML = `
            <input type="radio" name="systemPrompt" data-id="${prompt.id}">
            <span>${prompt.name}</span>
            <button class="delete-prompt-btn" data-id="${prompt.id}" title="Edit">✕</button>
          `;
          container.appendChild(item);
        });
      }

      function renderChatCharacterList() {
        const container = document.getElementById('chatCharacterList');
        container.innerHTML = '';

        if (characters.length === 0) {
          container.innerHTML = '<div class="chat-settings-item" style="color: var(--text-secondary); font-style: italic;">No characters yet</div>';
          return;
        }

        characters.forEach(char => {
          const item = document.createElement('label');
          item.className = 'chat-settings-item';
          item.innerHTML = `
            <input type="checkbox" data-char-id="${char.id}">
            <span>${char.name || 'Unnamed'}</span>
          `;
          container.appendChild(item);
        });
      }

      function openChatSettings() {
        document.getElementById('chatSettingsOverlay').classList.add('visible');
        document.getElementById('chatSettingsPanel').classList.add('open');
      }

      function closeChatSettings() {
        document.getElementById('chatSettingsOverlay').classList.remove('visible');
        document.getElementById('chatSettingsPanel').classList.remove('open');
      }

      function showSystemPromptModal(editId) {
        currentEditingPromptId = editId || null;
        const modal = document.getElementById('systemPromptModal');
        const title = document.getElementById('systemPromptModalTitle');
        const nameInput = document.getElementById('systemPromptNameInput');
        const contentInput = document.getElementById('systemPromptContentInput');
        const deleteBtn = document.getElementById('deleteSystemPromptBtn');

        if (editId) {
          const prompt = systemPrompts.find(p => p.id === editId);
          if (prompt) {
            title.textContent = 'Edit System Prompt';
            nameInput.value = prompt.name;
            contentInput.value = prompt.content;
            deleteBtn.style.display = 'block';
          }
        } else {
          title.textContent = 'Add System Prompt';
          nameInput.value = '';
          contentInput.value = '';
          deleteBtn.style.display = 'none';
        }

        modal.classList.add('visible');
        nameInput.focus();
      }

      function hideSystemPromptModal() {
        document.getElementById('systemPromptModal').classList.remove('visible');
        currentEditingPromptId = null;
      }

      function saveSystemPrompt() {
        const nameInput = document.getElementById('systemPromptNameInput');
        const contentInput = document.getElementById('systemPromptContentInput');
        const name = nameInput.value.trim();
        const content = contentInput.value.trim();

        if (!name) {
          nameInput.focus();
          return;
        }

        if (currentEditingPromptId) {
          const prompt = systemPrompts.find(p => p.id === currentEditingPromptId);
          if (prompt) {
            prompt.name = name;
            prompt.content = content;
          }
        } else {
          systemPrompts.push({
            id: generateId(),
            name: name,
            content: content
          });
        }

        saveSystemPrompts();
        renderChatSystemPromptList();
        updateSelectedContextTags();
        hideSystemPromptModal();
      }

      function deleteSystemPrompt() {
        if (!currentEditingPromptId) return;

        systemPrompts = systemPrompts.filter(p => p.id !== currentEditingPromptId);
        saveSystemPrompts();
        renderChatSystemPromptList();
        updateSelectedContextTags();
        hideSystemPromptModal();
      }

      function initChatPanel() {
        loadSystemPrompts();
        renderChatSystemPromptList();
        renderChatCharacterList();

        // Settings panel open/close
        document.getElementById('chatSettingsBtn').addEventListener('click', openChatSettings);
        document.getElementById('chatSettingsClose').addEventListener('click', closeChatSettings);
        document.getElementById('chatSettingsOverlay').addEventListener('click', closeChatSettings);

        // System prompt list events - radio buttons handle single selection naturally
        document.getElementById('chatSystemPromptList').addEventListener('change', (e) => {
          if (e.target.type === 'radio') {
            updateSelectedContextTags();
          }
        });

        document.getElementById('chatSystemPromptList').addEventListener('click', (e) => {
          if (e.target.classList.contains('delete-prompt-btn')) {
            const id = e.target.dataset.id;
            const prompt = systemPrompts.find(p => p.id === id);
            if (prompt) {
              document.getElementById('systemPromptNameInput').value = prompt.name;
              document.getElementById('systemPromptContentInput').value = prompt.content;
              showSystemPromptModal(id);
            }
          }
        });

        // Character list events
        document.getElementById('chatCharacterList').addEventListener('change', (e) => {
          if (e.target.type === 'checkbox') {
            updateSelectedContextTags();
          }
        });

        // Story/Plotmap checkbox events
        document.getElementById('chatIncludeStory').addEventListener('change', updateSelectedContextTags);
        document.getElementById('chatIncludePlotmap').addEventListener('change', updateSelectedContextTags);

        // Add prompt button
        document.getElementById('addSystemPromptBtn').addEventListener('click', () => {
          showSystemPromptModal();
        });

        // Modal events
        document.getElementById('cancelSystemPromptBtn').addEventListener('click', hideSystemPromptModal);
        document.getElementById('saveSystemPromptBtn').addEventListener('click', saveSystemPrompt);
        document.getElementById('deleteSystemPromptBtn').addEventListener('click', deleteSystemPrompt);

        document.getElementById('systemPromptModal').addEventListener('click', (e) => {
          if (e.target.id === 'systemPromptModal') {
            hideSystemPromptModal();
          }
        });

        // User prompt input with debounced save
        const chatPromptInput = document.getElementById('chatPromptInput');
        const debouncedSavePrompt = debounce(() => {
          localStorage.setItem('storywriter_chat_prompt', chatPromptInput.value);
        }, 500);

        chatPromptInput.addEventListener('input', debouncedSavePrompt);

        // Load saved prompt
        const savedPrompt = localStorage.getItem('storywriter_chat_prompt') || '';
        chatPromptInput.value = savedPrompt;

        // Copy button - combines user's prompt with selected context
        document.getElementById('copyPromptBtn').addEventListener('click', () => {
          const userPrompt = chatPromptInput.value.trim();
          const contextPrompt = generateChatPrompt();

          if (!userPrompt && !contextPrompt) return;

          // Combine: context first, then user's prompt at the end
          let fullPrompt = '';
          if (contextPrompt) {
            fullPrompt += contextPrompt;
          }
          if (userPrompt) {
            fullPrompt += `=== USER PROMPT ===\n${userPrompt}\n\n`;
          }

          navigator.clipboard.writeText(fullPrompt).then(() => {
            const btn = document.getElementById('copyPromptBtn');
            btn.classList.add('copied');
            btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg> Copied!';
            setTimeout(() => {
              btn.classList.remove('copied');
              btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 01-.75.75H9.75a.75.75 0 01-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 011.927-.184" /></svg> Copy to Clipboard';
            }, 2000);
          });
        });

        // Initial context tags update
        updateSelectedContextTags();
      }

      // Initialize
      function init() {
        initTabs();
        initStoryPanel();
        initCharacterPanel();
        initPlotmapPanel();
        initChatPanel();
      }

      init();
    })();
  </script>
</body>
</html>
